<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Products Checklist Dashboard</title>
    <style>
        :root {
            --primary-color: #5c3e35;
            --accent-color: #d2eaf7;
            --bg-color: #fcfbfa;
            --card-bg: #ffffff;
            --text-color: #2b2b2b;
            --border-color: #d9d9d9;
            --success-color: #388e3c;
            --warning-color: #f57c00;
            --danger-color: #d32f2f;
            --highlight-color: #fff59d;
        }

        #masterAuthShield {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #5c3e35;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999999;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .auth-card {
            background-color: white;
            color: #2b2b2b;
            padding: 40px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .auth-card h2 {
            margin-top: 0;
            color: #5c3e35;
            font-size: 1.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .auth-card p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .auth-input {
            width: 100%;
            padding: 12px 20px;
            margin-bottom: 15px;
            box-sizing: border-box;
            border: 2px solid #d9d9d9;
            border-radius: 25px;
            font-size: 1rem;
            text-align: center;
            outline: none;
        }

        .auth-input:focus {
            border-color: #5c3e35;
        }

        .auth-submit-btn {
            background-color: #5c3e35;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            width: 100%;
        }

        .error-message {
            color: #d32f2f;
            font-size: 0.85rem;
            font-weight: bold;
            margin-top: 10px;
            display: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 30px 20px;
            line-height: 1.5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            border-bottom: 5px solid var(--primary-color);
            padding-bottom: 15px;
            margin-bottom: 35px;
        }

        header h1 {
            color: var(--primary-color);
            font-size: 2.4rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            font-weight: 800;
        }

        .overall-view-panel {
            background: #fff;
            border: 2px solid var(--primary-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            overflow-x: auto;
        }

        .overall-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #eee;
            padding-bottom: 5px;
        }

        .matrix-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.9rem;
        }

        .matrix-table th, .matrix-table td {
            border: 1px solid var(--border-color);
            padding: 10px 12px;
            vertical-align: middle;
        }
